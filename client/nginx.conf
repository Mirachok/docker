server {
    listen 80;

    location /api/ {
        proxy_set_header Authorization $http_authorization;
        proxy_pass http://api.railway.internal:3000/api/;
    }

    location /uploads/ {
        proxy_pass http://api.railway.internal:3000/uploads/;
    }

    location / {
        root /usr/share/nginx/html;
        try_files $uri /index.html;
    }
}
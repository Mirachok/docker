server {
    listen 80;

    location /api/ {
        proxy_set_header Authorization $http_authorization;
        proxy_pass https://api.railway.internal.up.railway.app/api/;
    }

    location /uploads/ {
        proxy_pass https://api.railway.internal.up.railway.app/uploads/;
    }

    location / {
        root /usr/share/nginx/html;
        try_files $uri /index.html;
    }
}
